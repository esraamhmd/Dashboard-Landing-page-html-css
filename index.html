<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <title>Dashboard</title>
</head>
<body>
    <div class="menu">
        <ul>
            <li class="profile">
                <div class="img-box">
                    <!-- Use relative path instead of C: -->
                    <img src="user-200x300.webp" alt="profile">
                </div>
                <h2>Ahmed</h2>
            </li>
            <li><a class="active" href="#"><i class="fas fa-home"></i><p>Dashboard</p></a></li>
            <li><a href="#"><i class="fas fa-user-group"></i><p>Clients</p></a></li>
            <li><a href="#"><i class="fas fa-table"></i><p>Products</p></a></li>
            <li><a href="#"><i class="fas fa-chart-pie"></i><p>Charts</p></a></li>
            <li><a href="#"><i class="fas fa-pen"></i><p>Posts</p></a></li>
            <li><a href="#"><i class="fas fa-star"></i><p>Favorite</p></a></li>
            <li><a href="#"><i class="fas fa-cog"></i><p>Settings</p></a></li>
            <li class="log-out"><a href="#"><i class="fas fa-sign-out-alt"></i><p>Log out</p></a></li>
        </ul>
    </div>

    <div class="content">
        <div class="title-info">
            <h1>Dashboard</h1>
            <i class="fas fa-chart-bar"></i>
        </div>

        <div class="data-info">
            <div class="box">
                <i class="fas fa-users"></i>
                <div class="data">
                    <p>Users</p>
                    <span>1000</span>
                </div>
            </div>
            <div class="box">
                <i class="fas fa-pen"></i>
                <div class="data">
                    <p>Posts</p>
                    <span>234</span>
                </div>
            </div>
            <div class="box">
                <i class="fas fa-table"></i>
                <div class="data">
                    <p>Products</p>
                    <span>345</span>
                </div>
            </div>
            <div class="box">
                <i class="fas fa-dollar-sign"></i>
                <div class="data">
                    <p>Revenue</p>
                    <span>$123</span>
                </div>
            </div>
        </div>

        <!-- Products Table Section -->
        <div class="title-info">
            <h1>Products</h1>
            <i class="fas fa-table"></i>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Count</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Product 1</td>
                    <td><span class="price">$10</span></td>
                    <td><span class="count">100</span></td>
                </tr>
                <tr>
                    <td>Product 2</td>
                    <td><span class="price">$15</span></td>
                    <td><span class="count">200</span></td>
                </tr>
                <tr>
                    <td>Product 3</td>
                    <td><span class="price">$20</span></td>
                    <td><span class="count">150</span></td>
                </tr>
                <tr>
                    <td>Product 4</td>
                    <td><span class="price">$8</span></td>
                    <td><span class="count">80</span></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
